<!DOCTYPE html>
<html>
<head><style>
body { margin: 0; background: #111; display: flex; flex-direction: column; }
.row { display: flex; }
.row img { width: 33.33vw; display: block; }
.overlay { position: relative; width: 50vw; margin: 8px auto; }
.overlay img { width: 100%; display: block; }
.overlay img.top { position: absolute; inset: 0; opacity: 0.5; }
p { color: #fff; font-family: sans-serif; margin: 6px; font-size: 13px; }
</style></head>
<body>
<p>1: original.avif | 2: styled_day | 3: styled_evening</p>
<div class="row">
  <img src="/film/styling/original.avif" />
  <img src="/film/styling/styled_day.webp" />
  <img src="/film/styling/styled_evening.webp" />
</div>
<p>Overlay-test: original (50%) oppå styled_day — sjekk geometri-match</p>
<div class="overlay">
  <img src="/film/styling/styled_day.webp" />
  <img class="top" src="/film/styling/original.avif" />
</div>
</body>
</html>
